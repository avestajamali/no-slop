<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 312" role="img" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
<title>Effect sizes: no-slop FULL beats every competitor arm</title>
<desc>Animated Cohen's d bars: no-slop FULL versus bare Opus d=1.54, versus humanize d=0.69, versus slopless d=0.45, versus jalaalrd d=0.43, all significant; versus its own COMPACT tier d=0.05, statistically identical.</desc>
<rect x="0" y="0" width="680" height="312" rx="16" fill="#14161f"/>
<text x="36" y="46" fill="#f0f2f6" font-size="20" font-weight="600">no-slop FULL vs every arm</text>
<text x="36" y="68" fill="#8b93a4" font-size="13">Cohen's d effect size · Welch t on subject means · n=356</text>
<g font-size="14">
  <text x="196" y="112" text-anchor="end" fill="#e6e9ef">vs bare Opus</text>
  <rect x="210" y="98" width="289" height="20" rx="4" fill="#1baf7a">
    <animate attributeName="width" values="0;0;289;289;0" keyTimes="0;0;0.16;0.9;1" dur="6.5s" repeatCount="indefinite"/></rect>
  <text x="507" y="112" fill="#5dcaa5" font-weight="600">d 1.54 · p &lt; 1e-11
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.12;0.18;0.9;1" dur="6.5s" repeatCount="indefinite"/></text>
  <text x="196" y="152" text-anchor="end" fill="#e6e9ef">vs humanize</text>
  <rect x="210" y="138" width="129" height="20" rx="4" fill="#1baf7a">
    <animate attributeName="width" values="0;0;129;129;0" keyTimes="0;0.05;0.21;0.9;1" dur="6.5s" repeatCount="indefinite"/></rect>
  <text x="347" y="152" fill="#5dcaa5" font-weight="600">d 0.69 · p 0.0003
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.17;0.23;0.9;1" dur="6.5s" repeatCount="indefinite"/></text>
  <text x="196" y="192" text-anchor="end" fill="#e6e9ef">vs slopless</text>
  <rect x="210" y="178" width="84" height="20" rx="4" fill="#1baf7a">
    <animate attributeName="width" values="0;0;84;84;0" keyTimes="0;0.1;0.26;0.9;1" dur="6.5s" repeatCount="indefinite"/></rect>
  <text x="302" y="192" fill="#5dcaa5" font-weight="600">d 0.45 · p 0.014
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.28;0.9;1" dur="6.5s" repeatCount="indefinite"/></text>
  <text x="196" y="232" text-anchor="end" fill="#e6e9ef">vs jalaalrd</text>
  <rect x="210" y="218" width="81" height="20" rx="4" fill="#1baf7a">
    <animate attributeName="width" values="0;0;81;81;0" keyTimes="0;0.15;0.31;0.9;1" dur="6.5s" repeatCount="indefinite"/></rect>
  <text x="299" y="232" fill="#5dcaa5" font-weight="600">d 0.43 · p 0.024
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.27;0.33;0.9;1" dur="6.5s" repeatCount="indefinite"/></text>
  <text x="196" y="272" text-anchor="end" fill="#8b93a4">vs COMPACT tier</text>
  <rect x="210" y="258" width="9" height="20" rx="4" fill="#3f4657">
    <animate attributeName="width" values="0;0;9;9;0" keyTimes="0;0.2;0.36;0.9;1" dur="6.5s" repeatCount="indefinite"/></rect>
  <text x="228" y="272" fill="#8b93a4">d 0.05 · statistically identical
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.38;0.9;1" dur="6.5s" repeatCount="indefinite"/></text>
</g>
<text x="36" y="298" fill="#697082" font-size="12">Every competitor gap is significant; the two no-slop tiers are not.</text>
</svg>
